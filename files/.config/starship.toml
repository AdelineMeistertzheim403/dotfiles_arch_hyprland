add_newline = true

format = """
$username$hostname$directory$git_branch$git_status
$nodejs$java$docker_context
$character
"""

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
style = "bold cyan"
truncate_to_repo = false

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "red"

[nodejs]
symbol = "󰎙 "
style = "bold green"

[java]
symbol = " "
style = "bold red"

[docker_context]
symbol = "󰡨 "
style = "blue"
