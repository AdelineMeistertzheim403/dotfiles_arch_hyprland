###############
### GENERAL ###
###############
general {
    gaps_in = 8
    gaps_out = 16
    border_size = 3
    col.active_border = rgba(66d9efff) rgba(ffb86cff) 35deg
    col.inactive_border = rgba(24283bee)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

##################
### DECORATION ###
##################
decoration {
    rounding = 12
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 0.94

    shadow {
        enabled = true
        range = 16
        render_power = 4
        color = rgba(16161e99)
    }

    blur {
        enabled = true
        size = 12
        passes = 3
        new_optimizations = true
        vibrancy = 0.35
    }
}
