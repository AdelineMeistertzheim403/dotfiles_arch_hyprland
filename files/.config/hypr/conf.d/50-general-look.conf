###############
### GENERAL ###
###############
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(8be9fdee) rgba(50fa7bee) 45deg
    col.inactive_border = rgba(44475aaa)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

##################
### DECORATION ###
##################
decoration {
    rounding = 12
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 6
        render_power = 3
        color = rgba(00000055)
    }

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        vibrancy = 0.18
    }
}
