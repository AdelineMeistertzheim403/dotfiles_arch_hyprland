#################
### AUTOSTART ###
#################
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP XDG_SESSION_TYPE DISPLAY
exec-once = systemctl --user daemon-reload
exec-once = systemctl --user restart waybar.service
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# A reactiver plus tard quand installes :
exec-once = hyprpaper
exec-once = mako
exec-once = qs -c spotlight
# exec-once = cliphist store
# exec-once = blueman-applet
exec-once = hypridle
exec-once = systemctl --user restart thermal-alert.service
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
