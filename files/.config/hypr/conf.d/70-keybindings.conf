#################
### KEYBINDINGS ###
#################
# Terminal
bind = $mainMod, RETURN, exec, bash $appRouterScript terminal

# Apps
bind = $mainMod, B, exec, bash $appRouterScript browser
bind = $mainMod, C, exec, bash $appRouterScript code
bind = $mainMod, M, exec, bash $appRouterScript chat
# bind = $mainMod, D, exec, wofi --show drun
bind = SUPER, D, exec, sh -c 'qs -c spotlight ipc call launcher show; $launcherCmd'
bind = SUPER SHIFT, D, exec, qs -c spotlight ipc call launcher hide
bind = SUPER SHIFT, Q, exec, pkill qs
bind = $mainMod, E, exec, bash $appRouterScript files
bind = $mainMod SHIFT, W, exec, systemctl --user restart waybar.service

# Window management
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, E, exit
bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, F, exec, bash $focusModeScript toggle
bind = $mainMod SHIFT, G, exec, bash $focusModeScript gaming
bind = $mainMod SHIFT, O, exec, bash $focusModeScript stream
bind = $mainMod SHIFT, N, exec, bash $focusModeScript normal
bind = $mainMod SHIFT, A, exec, bash $focusModeScript auto-toggle
bind = $mainMod SHIFT, P, exec, bash $focusModeScript presentation-toggle
bind = $mainMod ALT, left, exec, bash $appRouterScript move-active left
bind = $mainMod ALT, up, exec, bash $appRouterScript move-active laptop
bind = $mainMod ALT, right, exec, bash $appRouterScript move-active right
bind = $mainMod CTRL ALT, left, focusmonitor, DP-4
bind = $mainMod CTRL ALT, up, focusmonitor, eDP-1
bind = $mainMod CTRL ALT, right, focusmonitor, DP-2
bind = $mainMod, L, exec, hyprlock
bind = $mainMod, SPACE, togglefloating
bind = $mainMod SHIFT, SPACE, centerwindow
bind = $mainMod, P, pseudo
bind = $mainMod, J, togglesplit
bind = $mainMod, TAB, cyclenext
bind = $mainMod SHIFT, TAB, cyclenext, prev

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize active window by keyboard
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d
binde = $mainMod CTRL, left, resizeactive, -40 0
binde = $mainMod CTRL, right, resizeactive, 40 0
binde = $mainMod CTRL, up, resizeactive, 0 -40
binde = $mainMod CTRL, down, resizeactive, 0 40

################
### SCREENSHOTS ###
################

# Selection -> fichier + presse-papiers
bind = SUPER, S, exec, sh -c 'DIR="$screenshotDir"; mkdir -p "$DIR"; FILE="$DIR/screenshot_$(date +%F_%H-%M-%S).png"; grim -g "$(slurp)" "$FILE" && wl-copy < "$FILE"'

# Selection -> edition (swappy)
bind = SUPER SHIFT, S, exec, grim -g "$(slurp)" - | swappy -f -

# Ecran entier -> fichier
bind = SUPER, PRINT, exec, sh -c 'DIR="$screenshotDir"; mkdir -p "$DIR"; grim "$DIR/screenshot_$(date +%F_%H-%M-%S).png"'

# Fenetre active -> fichier
bind = SUPER SHIFT, PRINT, exec, sh -c 'DIR="$screenshotDir"; mkdir -p "$DIR"; grim -g "$(hyprctl activewindow -j | jq -r ".at[0],.at[1],.size[0],.size[1]" | paste -sd "," -)" "$DIR/screenshot_window_$(date +%F_%H-%M-%S).png"'

# Focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = ALT, TAB, cyclenext
bind = ALT SHIFT, TAB, cyclenext, prev

# Clipboard history
bind = $mainMod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Audio
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brightness
bindel = ,XF86MonBrightnessUp, exec, brightnessctl set +5%
bindel = ,XF86MonBrightnessDown, exec, brightnessctl set 5%-
